name: Flutter CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze project source
        run: flutter analyze

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Setup environment files
        run: |
          echo "MOCK_API=true" > .env.dev
          echo "DISABLE_RATE_LIMIT=true" >> .env.dev
          echo "MAX_REQUESTS_PER_HOUR=500" >> .env.dev
          echo "MAX_REQUESTS_PER_MINUTE=5" >> .env.dev
          echo "FIREBASE_ANALYTICS_ENABLED=false" >> .env.dev
          echo "AIRNOW_API_KEY=test_key" >> .env.dev
          
          echo "MOCK_API=false" > .env.prod
          echo "DISABLE_RATE_LIMIT=false" >> .env.prod
          echo "MAX_REQUESTS_PER_HOUR=500" >> .env.prod
          echo "MAX_REQUESTS_PER_MINUTE=5" >> .env.prod
          echo "FIREBASE_ANALYTICS_ENABLED=true" >> .env.prod
          echo "AIRNOW_API_KEY=test_key" >> .env.prod
      - name: Install dependencies
        run: flutter pub get
      - name: Run unit and widget tests
        run: flutter test
      - name: Run integration tests
        run: flutter test test/integration/

  build-android:
    name: Build Android APK
    needs: [analyze, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Setup environment files
        run: |
          echo "MOCK_API=true" > .env.dev
          echo "DISABLE_RATE_LIMIT=true" >> .env.dev
          echo "MAX_REQUESTS_PER_HOUR=500" >> .env.dev
          echo "MAX_REQUESTS_PER_MINUTE=5" >> .env.dev
          echo "FIREBASE_ANALYTICS_ENABLED=false" >> .env.dev
          echo "AIRNOW_API_KEY=test_key" >> .env.dev
          
          echo "MOCK_API=false" > .env.prod
          echo "DISABLE_RATE_LIMIT=false" >> .env.prod
          echo "MAX_REQUESTS_PER_HOUR=500" >> .env.prod
          echo "MAX_REQUESTS_PER_MINUTE=5" >> .env.prod
          echo "FIREBASE_ANALYTICS_ENABLED=true" >> .env.prod
          echo "AIRNOW_API_KEY=test_key" >> .env.prod
      - name: Install dependencies
        run: flutter pub get
      - name: Prepare placeholder Firebase config
        run: cp android/app/google-services.example.json android/app/google-services.json
      - name: Build APK
        run: flutter build apk --flavor dev -t lib/main_dev.dart
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-dev
          path: build/app/outputs/flutter-apk/app-dev-release.apk

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Setup environment files
        run: |
          echo "MOCK_API=true" > .env.dev
          echo "DISABLE_RATE_LIMIT=true" >> .env.dev
          echo "MAX_REQUESTS_PER_HOUR=500" >> .env.dev
          echo "MAX_REQUESTS_PER_MINUTE=5" >> .env.dev
          echo "FIREBASE_ANALYTICS_ENABLED=false" >> .env.dev
          echo "AIRNOW_API_KEY=test_key" >> .env.dev
          
          echo "MOCK_API=false" > .env.prod
          echo "DISABLE_RATE_LIMIT=false" >> .env.prod
          echo "MAX_REQUESTS_PER_HOUR=500" >> .env.prod
          echo "MAX_REQUESTS_PER_MINUTE=5" >> .env.prod
          echo "FIREBASE_ANALYTICS_ENABLED=true" >> .env.prod
          echo "AIRNOW_API_KEY=test_key" >> .env.prod
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Install lcov
        run: sudo apt-get install -y lcov
      
      - name: Run tests with coverage
        run: flutter test --coverage
      
      - name: Generate coverage report
        run: genhtml coverage/lcov.info -o coverage/html
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html
